name: release

# Pushing a release tag (vX.Y.Z) to LogosLang:
#   1. creates the GitHub Release,
#   2. builds a per-OS/arch artifact and uploads it under the naming convention the
#      website's download page reads:  logos-<tag>-<os>-<arch>.<ext>
#        os   = macos | linux | windows
#        arch = x86_64 | aarch64
#        ext  = tar.gz (macos, linux) | zip (windows)
#   3. notifies the website (repository_dispatch `logoslang-release`), which freezes
#      the docs at this version and fires a deploy hook so the new build + docs
#      appear together.
#
# Requires repo secret WEBSITE_DISPATCH_TOKEN: a fine-grained PAT scoped to
# ThobiasKnudsen/LogosLangWebsite with Contents: read & write (the default
# GITHUB_TOKEN cannot dispatch cross-repo).

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # create the release and upload assets

# Process one release at a time. If two version tags are pushed close together, the
# second waits for the first instead of racing it (and none are dropped).
concurrency:
  group: logoslang-release
  cancel-in-progress: false

jobs:
  # Fail fast on a bad tag before anything is built or any release is created:
  # the tag must be strict semver vX.Y.Z and strictly newer than every existing tag.
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Validate the release tag (format + strictly newer)
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if ! printf '%s' "$TAG" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Tag '$TAG' is not a strict version vX.Y.Z (e.g. v0.0.3)."
            exit 1
          fi
          cur="${TAG#v}"
          highest="$(git tag --list 'v*.*.*' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | grep -vx "$TAG" \
            | sed 's/^v//' \
            | sort -V | tail -n1)"
          if [ -n "$highest" ]; then
            newest="$(printf '%s\n%s\n' "$cur" "$highest" | sort -V | tail -n1)"
            if [ "$newest" = "$highest" ]; then
              echo "::error::Tag '$TAG' is not newer than the latest release 'v$highest'. Release versions must strictly increase."
              exit 1
            fi
          fi
          echo "OK: $TAG is a valid release tag (previous highest: ${highest:+v}${highest:-none})."

  create-release:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - name: Create the GitHub Release for this tag (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
          else
            gh release create "$TAG" --repo "$GITHUB_REPOSITORY" --title "$TAG" --generate-notes
          fi

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux, arch: x86_64, runner: ubuntu-latest, ext: tar.gz }
          - { os: linux, arch: aarch64, runner: ubuntu-latest, ext: tar.gz }
          - { os: macos, arch: x86_64, runner: macos-13, ext: tar.gz }
          - { os: macos, arch: aarch64, runner: macos-14, ext: tar.gz }
          - { os: windows, arch: x86_64, runner: windows-latest, ext: zip }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      # ── PLACEHOLDER BUILD ────────────────────────────────────────────────────
      # TODO: replace this stub with the real Logos toolchain build for
      # ${{ matrix.os }}/${{ matrix.arch }} (compile the Rust seed, then bootstrap
      # the self-hosting compiler). The stub keeps the release pipeline wired
      # end-to-end so the website's download page works the moment a real binary
      # is produced — nothing here pretends to be a working compiler.
      - name: Build (placeholder — no compiler yet)
        shell: bash
        env:
          TAG: ${{ github.ref_name }}
          OS: ${{ matrix.os }}
          ARCH: ${{ matrix.arch }}
        run: |
          STAGE="logos-${TAG}-${OS}-${ARCH}"
          mkdir -p "$STAGE/bin"
          if [ "$OS" = "windows" ]; then BIN="$STAGE/bin/logos.cmd"; else BIN="$STAGE/bin/logos"; fi
          printf 'Logos %s (%s/%s) — pre-alpha placeholder, no compiler yet.\nSee https://logoslang.dev/roadmap/\n' "$TAG" "$OS" "$ARCH" > "$BIN"
          chmod +x "$BIN" || true
          printf 'Logos %s (%s/%s)\n\nThis is a PLACEHOLDER build. Logos has no working compiler yet; this\narchive exists only to wire the release pipeline end to end.\n' "$TAG" "$OS" "$ARCH" > "$STAGE/README.txt"
          echo "STAGE=$STAGE" >> "$GITHUB_ENV"

      - name: Package (tar.gz)
        if: matrix.ext == 'tar.gz'
        shell: bash
        run: tar -czf "${STAGE}.tar.gz" "$STAGE"

      - name: Package (zip)
        if: matrix.ext == 'zip'
        shell: pwsh
        run: Compress-Archive -Path "$env:STAGE" -DestinationPath "$($env:STAGE).zip"

      - name: Upload the artifact to the release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" "${STAGE}.${{ matrix.ext }}" --repo "$GITHUB_REPOSITORY" --clobber

  # The OS/arch-agnostic WebAssembly build that powers the website's playground.
  build-wasm:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # ── PLACEHOLDER WASM BUILD ───────────────────────────────────────────────
      # TODO: replace with the real Logos runtime compiled to WebAssembly — the
      # module the playground loads and evaluates against. The stub below is a
      # minimal *valid* empty wasm module (the 8-byte header), so the asset exists
      # and the naming convention is wired, but it does nothing yet.
      - name: Build wasm (placeholder — no compiler yet)
        env:
          TAG: ${{ github.ref_name }}
        run: printf '\x00\x61\x73\x6d\x01\x00\x00\x00' > "logos-${TAG}-wasm.wasm"
      - name: Upload the wasm asset to the release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }}
        run: gh release upload "$TAG" "logos-${TAG}-wasm.wasm" --repo "$GITHUB_REPOSITORY" --clobber

  notify-website:
    needs: [build, build-wasm]
    runs-on: ubuntu-latest
    steps:
      - name: Notify the website (freeze docs + refresh downloads)
        env:
          TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ThobiasKnudsen/LogosLangWebsite/dispatches \
            -d "{\"event_type\":\"logoslang-release\",\"client_payload\":{\"version\":\"${TAG}\"}}"
          echo "Dispatched logoslang-release for ${TAG}."
