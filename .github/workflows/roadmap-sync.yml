name: roadmap-sync

# The website roadmap (logoslang.dev/roadmap) is generated from this repo's
# `roadmap`-labelled issues (an issue = a station; its area:<key> label = the line;
# its milestone = the band; its state = the chip). Whenever a roadmap issue or a
# milestone changes, ping the website repo so it rebuilds and picks up the change.
#
# Reuses the same cross-repo dispatch as release.yml. Requires repo secret
# WEBSITE_DISPATCH_TOKEN: a fine-grained PAT scoped to
# ThobiasKnudsen/LogosLangWebsite with Contents: read & write (the default
# GITHUB_TOKEN cannot dispatch cross-repo). The website's roadmap-rebuild workflow
# receives the `roadmap-sync` event and fires the Cloudflare deploy hook.

on:
  issues:
    types:
      - opened
      - edited
      - deleted
      - closed
      - reopened
      - labeled
      - unlabeled
      - milestoned
      - demilestoned
      - transferred
  milestone:
    types: [created, edited, closed, opened, deleted]

permissions:
  contents: read

# One notify at a time; collapse a burst of edits.
concurrency:
  group: roadmap-sync
  cancel-in-progress: true

jobs:
  notify-website:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch roadmap-sync to the website repo
        env:
          TOKEN: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "WEBSITE_DISPATCH_TOKEN not set; cannot notify the website." >&2
            exit 0
          fi
          curl -sf -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/ThobiasKnudsen/LogosLangWebsite/dispatches \
            -d '{"event_type":"roadmap-sync"}'
          echo "Notified the website to rebuild."
